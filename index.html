<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0d12">
<title>FH6 Horizon Promo Tracker</title>
<style>
  :root{
    --bg:#0b0d12; --panel:#141823; --panel2:#1c2230; --line:#2a3242;
    --txt:#e8ecf4; --muted:#8b95a8; --accent:#7c5cff; --good:#36d399;
    --chip:#222a3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; line-height:1.35;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    position:sticky; top:0; z-index:20;
    background:rgba(11,13,18,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top)) 12px 8px;
  }
  .title{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .title h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px;}
  .menu-btn{
    background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:7px 11px;font-size:14px;font-weight:600;cursor:pointer;
  }
  .progwrap{margin-top:9px;}
  .progmeta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:5px;}
  .progmeta b{color:var(--txt);}
  .bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--good));border-radius:99px;transition:width .25s ease;}
  .search{margin-top:9px;position:relative;}
  .search input{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:11px 38px 11px 14px;font-size:16px;outline:none;
  }
  .search input::placeholder{color:var(--muted);}
  .search .clr{
    position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:var(--chip);border:none;color:var(--muted);width:26px;height:26px;border-radius:50%;
    font-size:15px;cursor:pointer;display:none;
  }
  .chips{display:flex;gap:7px;overflow-x:auto;padding:10px 2px 2px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;background:var(--chip);border:1px solid var(--line);color:var(--muted);
    border-radius:99px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip .n{opacity:.75;font-weight:500;margin-left:4px;font-size:12px;}

  main{padding:6px 10px 80px;}
  .group{margin-top:14px;}
  .ghead{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 6px 8px;position:sticky;top:0;
  }
  .ghead h2{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:0;font-weight:700;}
  .ghead .gcount{font-size:12px;color:var(--muted);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .row{
    display:flex;align-items:center;gap:12px;padding:12px 13px;cursor:pointer;
    border-top:1px solid var(--line);user-select:none;
  }
  .row:first-child{border-top:none;}
  .row:active{background:var(--panel2);}
  .box{
    flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
    background:transparent;display:flex;align-items:center;justify-content:center;transition:.12s;
  }
  .box svg{width:15px;height:15px;opacity:0;transform:scale(.5);transition:.12s;}
  .info{flex:1 1 auto;min-width:0;}
  .nm{font-size:15px;font-weight:600;line-height:1.25;}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:6px;vertical-align:middle;letter-spacing:.3px;white-space:nowrap;}
  .badge.barn{background:#3a2a1a;color:#ffb86b;border:1px solid #5a3d22;}
  .badge.fe{background:#2a1f3a;color:#c9a6ff;border:1px solid #3f2d5a;}
  .own{
    flex:0 0 auto;border:1.5px solid var(--line);background:transparent;color:var(--muted);
    border-radius:99px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;
    display:flex;align-items:center;gap:4px;transition:.12s;
  }
  .own.on{background:#13314a;border-color:#2f7fe0;color:#9fd0ff;}
  .statline{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:5px;}
  .statline b{color:var(--txt);}
  .statline .own-stat b{color:#9fd0ff;}
  .fchips{display:flex;gap:7px;overflow-x:auto;padding:8px 2px 0;scrollbar-width:none;align-items:center;}
  .fchips::-webkit-scrollbar{display:none;}
  .flabel{flex:0 0 auto;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;}
  .fsep{flex:0 0 auto;width:1px;height:20px;background:var(--line);margin:0 3px;}
  .fchip{
    flex:0 0 auto;background:var(--chip);border:1px solid var(--line);color:var(--muted);
    border-radius:99px;padding:5px 11px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;
  }
  .fchip.active{background:var(--txt);border-color:var(--txt);color:var(--bg);}
  .sub{font-size:12.5px;color:var(--muted);margin-top:1px;}
  .row.done .nm{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--line);}
  .row.done .box{background:var(--good);border-color:var(--good);}
  .row.done .box svg{opacity:1;transform:scale(1);}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px;}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;display:none;}
  .scrim.open{display:block;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:50;transform:translateY(100%);transition:transform .25s ease;
    background:var(--panel);border-top-left-radius:20px;border-top-right-radius:20px;
    border-top:1px solid var(--line);padding:8px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .sheet.open{transform:translateY(0);}
  .grab{width:42px;height:5px;border-radius:99px;background:var(--line);margin:8px auto 14px;}
  .sheet h3{margin:0 0 4px;font-size:16px;}
  .sheet p{margin:0 0 16px;color:var(--muted);font-size:13.5px;}
  .act{
    width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:14px;font-size:15px;font-weight:600;margin-bottom:10px;cursor:pointer;
    display:flex;align-items:center;gap:10px;
  }
  .act small{display:block;font-weight:400;color:var(--muted);font-size:12.5px;margin-top:2px;}
  .act.danger{color:#ff7b7b;}
  .ico{font-size:18px;width:22px;text-align:center;}
  textarea{
    width:100%;height:120px;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:12px;margin-bottom:10px;
  }
  .row-btns{display:flex;gap:10px;}
  .row-btns .act{margin-bottom:0;justify-content:center;}
</style>
</head>
<body>
<header>
  <div class="title">
    <h1>🏁 Horizon Promo Tracker</h1>
    <button class="menu-btn" id="menuBtn">Menu</button>
  </div>
  <div class="progwrap">
    <div class="statline">
      <span class="photo-stat">📷 <b id="photoN">0</b> / <span id="photoT">0</span> photographed</span>
      <span class="own-stat">🔑 <b id="ownN">0</b> / <span id="ownT">0</span> owned</span>
    </div>
    <div class="bar"><i id="progBar"></i></div>
  </div>
  <div class="search">
    <input id="search" type="search" inputmode="search" autocomplete="off" placeholder="Search car or maker…">
    <button class="clr" id="clrBtn">✕</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="fchips" id="fchips"></div>
</header>

<main id="list"></main>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <div id="sheetMain">
    <h3>Menu</h3>
    <p>Your progress is saved automatically in this browser. Use the filter chips up top to show only owned / not-owned / photographed / not-photographed cars.</p>
    <button class="act" id="hideFE"><span class="ico">✨</span><span>Hide special editions<small id="feState">Currently showing Forza Editions etc.</small></span></button>
    <button class="act" id="syncOwned"><span class="ico">🔄</span><span>Sync from my screenshots<small id="syncState">Apply latest owned + photographed</small></span></button>
    <button class="act" id="doExport"><span class="ico">⬆️</span><span>Export backup<small>Copy owned + photographed as text</small></span></button>
    <button class="act" id="doImport"><span class="ico">⬇️</span><span>Import backup<small>Restore from saved text</small></span></button>
    <button class="act danger" id="doReset"><span class="ico">♻️</span><span>Reset photographed<small>Uncheck every photographed car (keeps owned)</small></span></button>
  </div>
  <div id="sheetIO" style="display:none;">
    <h3 id="ioTitle">Backup</h3>
    <p id="ioDesc"></p>
    <textarea id="ioBox" spellcheck="false"></textarea>
    <div class="row-btns">
      <button class="act" id="ioBack">Back</button>
      <button class="act" id="ioGo" style="background:var(--accent);border-color:var(--accent);color:#fff;">Done</button>
    </div>
  </div>
</div>

function loadDone(){
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s===null) return new Set(PRESET_PHOTO); // seed from screenshots on first run
    return new Set(JSON.parse(s));
  }catch(e){ return new Set(); }
}
function saveDone(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify([...done])); }catch(e){} }
function loadOwned(){
  try{
    const s=localStorage.getItem(OWN_KEY);
    if(s===null) return new Set(PRESET_OWNED); // seed from screenshots on first run
    return new Set(JSON.parse(s));
  }catch(e){ return new Set(); }
}

const $ = s => document.querySelector(s);
const listEl = $("#list");

function classCounts(){
  const tot={}, dn={};
  CLASS_ORDER.forEach(c=>{tot[c]=0;dn[c]=0;});
  CARS.forEach(c=>{ if(hideFEFlag && c.tag==="fe") return; tot[c[3]]++; if(done.has(c.id)) dn[c[3]]++; });
  return {tot,dn};
}

function baseCars(){ return hideFEFlag ? CARS.filter(c=>c.tag!=="fe") : CARS; }

function renderChips(){
  const {tot,dn}=classCounts();
  const base=baseCars();
  const allDone=base.filter(c=>done.has(c.id)).length;
  const chips=[["ALL","All",base.length,allDone]];
  CLASS_ORDER.forEach(c=>chips.push([c,c,tot[c],dn[c]]));
  $("#chips").innerHTML = chips.map(([k,lbl,t,d])=>
    `<button class="chip ${activeClass===k?'active':''}" data-c="${k}">${lbl}<span class="n">${d}/${t}</span></button>`
  ).join("");
  $("#chips").querySelectorAll(".chip").forEach(b=>{
    b.onclick=()=>{ activeClass=b.dataset.c; renderChips(); renderList(); };
  });
}

function renderProgress(){
  const base=baseCars();
  const total=base.length;
  const d=base.filter(c=>done.has(c.id)).length;
  const o=base.filter(c=>owned.has(c.id)).length;
  const pct = total? Math.round(d/total*100):0;
  $("#photoN").textContent=d; $("#photoT").textContent=total;
  $("#ownN").textContent=o;   $("#ownT").textContent=total;
  $("#progBar").style.width = pct+"%";
}

    const cur = f.key==="photo"?photoFilter:ownFilter;
    f.opts.forEach(([v,lbl])=>{
      h+=`<button class="fchip ${cur===v?'active':''}" data-f="${f.key}" data-v="${v}">${lbl}</button>`;
    });
  });
  const el=$("#fchips"); el.innerHTML=h;
  el.querySelectorAll(".fchip").forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.f==="photo") photoFilter=b.dataset.v; else ownFilter=b.dataset.v;
      renderFchips(); renderList();
    };
  });
}

function matches(c){
  if(hideFEFlag && c.tag==="fe") return false;
  if(activeClass!=="ALL" && c[3]!==activeClass) return false;
  if(photoFilter==="yes" && !done.has(c.id)) return false;
  if(photoFilter==="no"  &&  done.has(c.id)) return false;
  if(ownFilter==="yes"   && !owned.has(c.id)) return false;
  if(ownFilter==="no"    &&  owned.has(c.id)) return false;
  if(query){
    const hay=(c[1]+" "+c[2]+" "+c[0]+" "+c[3]).toLowerCase();
    return query.split(/\s+/).every(t=>hay.includes(t));
  }
  return true;
}

function renderList(){
  const groups={};
  CLASS_ORDER.forEach(c=>groups[c]=[]);
  CARS.forEach(c=>{ if(matches(c)) groups[c[3]].push(c); });

  let html="";
  CLASS_ORDER.forEach(cl=>{
    const arr=groups[cl];
    if(!arr.length) return;
    const dn=arr.filter(c=>done.has(c.id)).length;
    html+=`<section class="group"><div class="ghead"><h2>Class ${cl}</h2><span class="gcount">${dn}/${arr.length}</span></div><div class="card">`;
    arr.forEach(c=>{
      const on=done.has(c.id);
      const ow=owned.has(c.id);
      const badge = c.tag==="barn" ? '<span class="badge barn">🛖 Barn Find</span>'
                  : c.tag==="fe" ? '<span class="badge fe">✨ Special</span>' : '';
      html+=`<div class="row ${on?'done':''}" data-id="${c.id}">
        <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#0b0d12" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></span>
        <span class="info"><span class="nm">${c[1]} ${c[2]}${badge}</span><span class="sub">${c[0]} · Class ${c[3]}</span></span>
        <button class="own ${ow?'on':''}">🔑</button>
      </div>`;
    });
    html+=`</div></section>`;
  });
  listEl.innerHTML = html || `<div class="empty">No cars match.<br>Try clearing the search or filter.</div>`;
}

listEl.addEventListener("click", e=>{
  const row=e.target.closest(".row"); if(!row) return;
  const id=row.dataset.id;
  if(e.target.closest(".own")){
    // toggle OWNED
    if(owned.has(id)) owned.delete(id); else owned.add(id);
    saveOwned();
    const btn=row.querySelector(".own"); btn.classList.toggle("on", owned.has(id));
    renderProgress();
    if(ownFilter!=="all") renderList();
    return;
  }
  // toggle PHOTOGRAPHED
  if(done.has(id)) done.delete(id); else done.add(id);
  saveDone();
  row.classList.toggle("done", done.has(id));
  renderProgress(); renderChips();
  if(photoFilter!=="all") renderList();
});

// search
const searchEl=$("#search");
searchEl.addEventListener("input", ()=>{
  query=searchEl.value.trim().toLowerCase();
  $("#clrBtn").style.display = query? "block":"none";
  renderList();
});
$("#clrBtn").onclick=()=>{ searchEl.value=""; query=""; $("#clrBtn").style.display="none"; renderList(); searchEl.focus(); };

// ---- Menu sheet ----
const scrim=$("#scrim"), sheet=$("#sheet");
function openSheet(){ scrim.classList.add("open"); sheet.classList.add("open"); }
function closeSheet(){ scrim.classList.remove("open"); sheet.classList.remove("open"); showMenu(); }
$("#menuBtn").onclick=openSheet;
scrim.onclick=closeSheet;

function showMenu(){ $("#sheetMain").style.display="block"; $("#sheetIO").style.display="none"; }
function showIO(){ $("#sheetMain").style.display="none"; $("#sheetIO").style.display="block"; }

$("#syncOwned").onclick=()=>{
  if(!PRESET_OWNED.length && !PRESET_PHOTO.length){ alert("No screenshot data is built in yet."); return; }
  if(confirm("Apply the latest screenshot data?\n\nOwned: "+PRESET_OWNED.length+" cars\nPhotographed: "+PRESET_PHOTO.length+" cars\n\nThis REPLACES your current owned and photographed marks.")){
    owned=new Set(PRESET_OWNED); done=new Set(PRESET_PHOTO);
    saveOwned(); saveDone(); renderAll(); closeSheet();
  }
};
$("#hideFE").onclick=()=>{
  hideFEFlag=!hideFEFlag;
  $("#feState").textContent = hideFEFlag? "Currently hiding Forza Editions etc.":"Currently showing Forza Editions etc.";
  renderAll(); closeSheet();
};

let ioMode="export";
$("#doExport").onclick=()=>{
  ioMode="export";
  $("#ioTitle").textContent="Export backup";
  $("#ioDesc").textContent="Copy this text and save it somewhere safe (Notes, email). It backs up both owned and photographed. Paste it back later to restore.";
  $("#ioBox").value=JSON.stringify({photo:[...done],owned:[...owned]});
  $("#ioGo").textContent="Copy";
  showIO();
};
$("#doImport").onclick=()=>{
  ioMode="import";
  $("#ioTitle").textContent="Import backup";
  $("#ioDesc").textContent="Paste a previously exported backup here, then tap Restore. This replaces your current progress.";
  $("#ioBox").value="";
  $("#ioGo").textContent="Restore";
  showIO();
};
$("#ioBack").onclick=showMenu;
$("#ioGo").onclick=()=>{
  if(ioMode==="export"){
    const box=$("#ioBox"); box.select();
    try{ navigator.clipboard.writeText(box.value); }catch(e){}
    try{ document.execCommand("copy"); }catch(e){}
    $("#ioGo").textContent="Copied ✓";
    setTimeout(()=>{$("#ioGo").textContent="Copy";},1200);
  } else {
    try{
      const data=JSON.parse($("#ioBox").value.trim());
      if(Array.isArray(data)){            // legacy backup = photographed only
        done=new Set(data);
      } else if(data && typeof data==="object"){
        done=new Set(data.photo||[]);
        owned=new Set(data.owned||[]);
      } else throw 0;
      saveDone(); saveOwned();
      renderAll(); closeSheet();
    }catch(e){ alert("That doesn't look like a valid backup."); }
  }
};
$("#doReset").onclick=()=>{
  if(confirm("Uncheck every PHOTOGRAPHED car? Owned marks are kept. This can't be undone (unless you have a backup).")){
    done=new Set(); saveDone(); renderAll(); closeSheet();
  }
};

function renderAll(){ renderChips(); renderFchips(); renderProgress(); renderList(); }
renderAll();
</script>
</body>
</html>
